<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1800" height="1200" viewBox="0 0 1800 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VISTA dashboard views</title>
  <desc id="desc">Three dashboard views for VISTA showing executive, delivery leadership, and team audience needs.</desc>
  <defs>
    <style>
      .title    { font: 700 42px 'Segoe UI', system-ui, sans-serif; fill: #1a2332; }
      .subtitle { font: 400 18px 'Segoe UI', system-ui, sans-serif; fill: #556677; }
      .label    { font: 700 11px 'Segoe UI', system-ui, sans-serif; fill: #7a8da0; letter-spacing: 2px; }
      .section  { font: 700 22px 'Segoe UI', system-ui, sans-serif; fill: #1a2332; }
      .dashSub  { font: 400 13px 'Segoe UI', system-ui, sans-serif; fill: #5a6a7c; }
      .metric   { font: 700 14px 'Segoe UI', system-ui, sans-serif; fill: #1a2332; }
      .metricBody { font: 400 13px 'Segoe UI', system-ui, sans-serif; fill: #3a4a5c; }
      .note     { font: 400 13px 'Segoe UI', system-ui, sans-serif; fill: #5a6a7c; font-style: italic; }
      .footBody { font: 400 14px 'Segoe UI', system-ui, sans-serif; fill: #4a5a6b; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a2332" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="page" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#f0f2f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1800" height="1200" fill="url(#page)"/>

  <!-- Title -->
  <text x="72" y="72" class="title">Three dashboard cuts for the same system</text>
  <text x="72" y="104" class="subtitle">Executives need result signals. Delivery leaders need structural signals. Teams need coaching signals they can act on every sprint.</text>

  <text x="72" y="160" class="label">AUDIENCE-SPECIFIC VIEWS</text>

  <!-- ========== COLUMN 1: EXECUTIVE ========== -->
  <rect x="72" y="186" width="540" height="870" rx="18" fill="#ffffff" stroke="#e2e6ec" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="72" y="186" width="540" height="6" rx="3" fill="#4a7fd4"/>
  <text x="104" y="230" class="section">Executive dashboard</text>
  <text x="104" y="252" class="dashSub">Mostly lagging measures showing whether the</text>
  <text x="104" y="270" class="dashSub">system produces the right outcomes.</text>

  <!-- Exec card 1: Value -->
  <rect x="104" y="296" width="476" height="90" rx="14" fill="#f6f8fc" stroke="#e2e6ec" stroke-width="1"/>
  <rect x="104" y="296" width="4" height="90" rx="2" fill="#4a7fd4"/>
  <text x="126" y="324" class="metric">Value</text>
  <text x="126" y="346" class="metricBody">Percent of delivered work with meaningful</text>
  <text x="126" y="364" class="metricBody">adoption and repeat usage</text>

  <!-- Exec card 2: Impact -->
  <rect x="104" y="402" width="476" height="90" rx="14" fill="#f6f8fc" stroke="#e2e6ec" stroke-width="1"/>
  <rect x="104" y="402" width="4" height="90" rx="2" fill="#d4943a"/>
  <text x="126" y="430" class="metric">Impact</text>
  <text x="126" y="452" class="metricBody">Percent of completed work that materially</text>
  <text x="126" y="470" class="metricBody">advanced a strategic initiative</text>

  <!-- Exec card 3: Safety -->
  <rect x="104" y="508" width="476" height="90" rx="14" fill="#f6f8fc" stroke="#e2e6ec" stroke-width="1"/>
  <rect x="104" y="508" width="4" height="90" rx="2" fill="#3a8a7a"/>
  <text x="126" y="536" class="metric">Safety</text>
  <text x="126" y="558" class="metricBody">Regressions, security issues, and cleanup</text>
  <text x="126" y="576" class="metricBody">burden per shipped item</text>

  <!-- Exec card 4: Timing -->
  <rect x="104" y="614" width="476" height="90" rx="14" fill="#f6f8fc" stroke="#e2e6ec" stroke-width="1"/>
  <rect x="104" y="614" width="4" height="90" rx="2" fill="#5a8a4a"/>
  <text x="126" y="642" class="metric">Timing</text>
  <text x="126" y="664" class="metricBody">Capacity spent on high-cost-of-delay work</text>

  <!-- Exec card 5: Adaptation -->
  <rect x="104" y="720" width="476" height="90" rx="14" fill="#f6f8fc" stroke="#e2e6ec" stroke-width="1"/>
  <rect x="104" y="720" width="4" height="90" rx="2" fill="#7a5a9a"/>
  <text x="126" y="748" class="metric">Adaptation</text>
  <text x="126" y="770" class="metricBody">Repeated issue types causing fewer</text>
  <text x="126" y="788" class="metricBody">regressions over time</text>

  <text x="104" y="856" class="note">This view should stay sparse. If it becomes</text>
  <text x="104" y="874" class="note">operationally noisy, leaders will start managing</text>
  <text x="104" y="892" class="note">the mechanics instead of the outcomes.</text>

  <!-- ========== COLUMN 2: DELIVERY LEADERSHIP ========== -->
  <rect x="640" y="186" width="540" height="870" rx="18" fill="#ffffff" stroke="#e2e6ec" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="640" y="186" width="540" height="6" rx="3" fill="#3a8a7a"/>
  <text x="672" y="230" class="section">Delivery leadership dashboard</text>
  <text x="672" y="252" class="dashSub">Structural measures for directors and managers</text>
  <text x="672" y="270" class="dashSub">improving the delivery system itself.</text>

  <!-- DL card 1 -->
  <rect x="672" y="296" width="476" height="90" rx="14" fill="#f6f8fc" stroke="#e2e6ec" stroke-width="1"/>
  <rect x="672" y="296" width="4" height="90" rx="2" fill="#3a8a7a"/>
  <text x="694" y="324" class="metric">Review depth matched to risk</text>
  <text x="694" y="346" class="metricBody">Are high-risk, high-value PRs getting the</text>
  <text x="694" y="364" class="metricBody">right review attention?</text>

  <!-- DL card 2 -->
  <rect x="672" y="402" width="476" height="90" rx="14" fill="#f6f8fc" stroke="#e2e6ec" stroke-width="1"/>
  <rect x="672" y="402" width="4" height="90" rx="2" fill="#3a8a7a"/>
  <text x="694" y="430" class="metric">Verification effectiveness by work type</text>
  <text x="694" y="452" class="metricBody">Which categories still surprise us</text>
  <text x="694" y="470" class="metricBody">after merge?</text>

  <!-- DL card 3 -->
  <rect x="672" y="508" width="476" height="90" rx="14" fill="#f6f8fc" stroke="#e2e6ec" stroke-width="1"/>
  <rect x="672" y="508" width="4" height="90" rx="2" fill="#3a8a7a"/>
  <text x="694" y="536" class="metric">Activation burden discovered late</text>
  <text x="694" y="558" class="metricBody">How often do rollout, docs, or support</text>
  <text x="694" y="576" class="metricBody">dependencies surface after coding?</text>

  <!-- DL card 4 -->
  <rect x="672" y="614" width="476" height="90" rx="14" fill="#f6f8fc" stroke="#e2e6ec" stroke-width="1"/>
  <rect x="672" y="614" width="4" height="90" rx="2" fill="#3a8a7a"/>
  <text x="694" y="642" class="metric">Hindsight quality of priority choices</text>
  <text x="694" y="664" class="metricBody">Did our sequencing logic hold up once</text>
  <text x="694" y="682" class="metricBody">the work landed?</text>

  <!-- DL card 5 -->
  <rect x="672" y="720" width="476" height="90" rx="14" fill="#f6f8fc" stroke="#e2e6ec" stroke-width="1"/>
  <rect x="672" y="720" width="4" height="90" rx="2" fill="#3a8a7a"/>
  <text x="694" y="748" class="metric">Post-merge issue trends by pattern</text>
  <text x="694" y="770" class="metricBody">Are the same failure classes recurring,</text>
  <text x="694" y="788" class="metricBody">or actually getting safer?</text>

  <text x="672" y="856" class="note">This dashboard is about leverage: where a</text>
  <text x="672" y="874" class="note">manager can change routing rules, review policy,</text>
  <text x="672" y="892" class="note">verification expectations, or planning discipline.</text>

  <!-- ========== COLUMN 3: TEAM ========== -->
  <rect x="1208" y="186" width="520" height="870" rx="18" fill="#ffffff" stroke="#e2e6ec" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="1208" y="186" width="520" height="6" rx="3" fill="#7a5a9a"/>
  <text x="1240" y="230" class="section">Team dashboard</text>
  <text x="1240" y="252" class="dashSub">Short-cycle signals that help a delivery team</text>
  <text x="1240" y="270" class="dashSub">improve judgment on current work.</text>

  <!-- Team card 1 -->
  <rect x="1240" y="296" width="456" height="90" rx="14" fill="#f6f8fc" stroke="#e2e6ec" stroke-width="1"/>
  <rect x="1240" y="296" width="4" height="90" rx="2" fill="#7a5a9a"/>
  <text x="1262" y="324" class="metric">Outcome clarity before start</text>
  <text x="1262" y="346" class="metricBody">Did we know what success looked like</text>
  <text x="1262" y="364" class="metricBody">before coding began?</text>

  <!-- Team card 2 -->
  <rect x="1240" y="402" width="456" height="90" rx="14" fill="#f6f8fc" stroke="#e2e6ec" stroke-width="1"/>
  <rect x="1240" y="402" width="4" height="90" rx="2" fill="#7a5a9a"/>
  <text x="1262" y="430" class="metric">Review depth versus PR risk</text>
  <text x="1262" y="452" class="metricBody">Are we reviewing proportionally, or using</text>
  <text x="1262" y="470" class="metricBody">one review mode for everything?</text>

  <!-- Team card 3 -->
  <rect x="1240" y="508" width="456" height="90" rx="14" fill="#f6f8fc" stroke="#e2e6ec" stroke-width="1"/>
  <rect x="1240" y="508" width="4" height="90" rx="2" fill="#7a5a9a"/>
  <text x="1262" y="536" class="metric">Similar issue safety trend</text>
  <text x="1262" y="558" class="metricBody">Are repeated issue types getting less</text>
  <text x="1262" y="576" class="metricBody">dangerous over time?</text>

  <!-- Team card 4 -->
  <rect x="1240" y="614" width="456" height="90" rx="14" fill="#f6f8fc" stroke="#e2e6ec" stroke-width="1"/>
  <rect x="1240" y="614" width="4" height="90" rx="2" fill="#7a5a9a"/>
  <text x="1262" y="642" class="metric">Opportunity-cost errors caught early</text>
  <text x="1262" y="664" class="metricBody">Did we spot a better option before</text>
  <text x="1262" y="682" class="metricBody">committing too much effort?</text>

  <!-- Team card 5 -->
  <rect x="1240" y="720" width="456" height="90" rx="14" fill="#f6f8fc" stroke="#e2e6ec" stroke-width="1"/>
  <rect x="1240" y="720" width="4" height="90" rx="2" fill="#7a5a9a"/>
  <text x="1262" y="748" class="metric">Reusable review guidance created</text>
  <text x="1262" y="770" class="metricBody">Are reviews producing future leverage,</text>
  <text x="1262" y="788" class="metricBody">not just one-time corrections?</text>

  <text x="1240" y="856" class="note">This is the coaching view. The measures should</text>
  <text x="1240" y="874" class="note">be close enough to current work that a team can</text>
  <text x="1240" y="892" class="note">change behavior in the next sprint.</text>

  <!-- ========== FOOTER ========== -->
  <rect x="72" y="1090" width="1656" height="74" rx="18" fill="#ffffff" stroke="#e2e6ec" stroke-width="1.5"/>
  <text x="104" y="1124" class="footBody">All three dashboards describe the same delivery system from different altitudes. If one audience gets the wrong altitude,</text>
  <text x="104" y="1144" class="footBody">it will either lose the signal or overreact to the wrong detail.</text>
</svg>