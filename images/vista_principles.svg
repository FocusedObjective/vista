<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1700" height="1100" viewBox="0 0 1700 1100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 40px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 19px Arial, Helvetica, sans-serif; fill: #475569; }
      .section { font: 700 24px Arial, Helvetica, sans-serif; fill: #1e293b; }
      .body { font: 500 20px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .num { font: 700 22px Arial, Helvetica, sans-serif; fill: white; }
      .footer { font: 600 18px Arial, Helvetica, sans-serif; fill: #1d4ed8; }
      .small { font: 500 16px Arial, Helvetica, sans-serif; fill: #475569; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,7 L0,14 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1700" height="1100" fill="#f8fafc"/>
  <text x="80" y="88" class="title">VISTA principles</text>
  <text x="80" y="124" class="subtitle">The principles are the documented “how to think” layer of the framework.</text>

  <rect x="80" y="165" width="1540" height="110" rx="28" ry="28" fill="white" filter="url(#shadow)"/>
  <text x="120" y="212" class="footer">Dimensions tell you what to look at. Principles tell you how to think.</text>
  <text x="120" y="244" class="small">These principles shape how teams judge value, sequencing, risk, review depth, and learning in the age of AI.</text>

<rect x="90" y="320" width="755" height="105" rx="24" ry="24" fill="white" filter="url(#shadow)"/>
<circle cx="134" cy="373" r="24" fill="#2563eb"/>
<text x="134" y="381" text-anchor="middle" class="num">1</text>
<text x="174" y="365" class="body">Output is not outcome</text>
<rect x="90" y="447" width="755" height="105" rx="24" ry="24" fill="white" filter="url(#shadow)"/>
<circle cx="134" cy="500" r="24" fill="#2563eb"/>
<text x="134" y="508" text-anchor="middle" class="num">2</text>
<text x="174" y="492" class="body">Speed without direction is waste</text>
<rect x="90" y="574" width="755" height="105" rx="24" ry="24" fill="white" filter="url(#shadow)"/>
<circle cx="134" cy="627" r="24" fill="#2563eb"/>
<text x="134" y="635" text-anchor="middle" class="num">3</text>
<text x="174" y="619" class="body">Work should be judged comparatively, not in</text>
<text x="174" y="643" class="body">isolation</text>
<rect x="90" y="701" width="755" height="105" rx="24" ry="24" fill="white" filter="url(#shadow)"/>
<circle cx="134" cy="754" r="24" fill="#2563eb"/>
<text x="134" y="762" text-anchor="middle" class="num">4</text>
<text x="174" y="746" class="body">Cost of delay matters</text>
<rect x="90" y="828" width="755" height="105" rx="24" ry="24" fill="white" filter="url(#shadow)"/>
<circle cx="134" cy="881" r="24" fill="#2563eb"/>
<text x="134" y="889" text-anchor="middle" class="num">5</text>
<text x="174" y="873" class="body">Risk gates value</text>
<rect x="855" y="320" width="755" height="105" rx="24" ry="24" fill="white" filter="url(#shadow)"/>
<circle cx="899" cy="373" r="24" fill="#2563eb"/>
<text x="899" y="381" text-anchor="middle" class="num">6</text>
<text x="939" y="365" class="body">Delivery cost is broader than coding cost</text>
<rect x="855" y="447" width="755" height="105" rx="24" ry="24" fill="white" filter="url(#shadow)"/>
<circle cx="899" cy="500" r="24" fill="#2563eb"/>
<text x="899" y="508" text-anchor="middle" class="num">7</text>
<text x="939" y="492" class="body">Review is a learning system</text>
<rect x="855" y="574" width="755" height="105" rx="24" ry="24" fill="white" filter="url(#shadow)"/>
<circle cx="899" cy="627" r="24" fill="#2563eb"/>
<text x="899" y="635" text-anchor="middle" class="num">8</text>
<text x="939" y="619" class="body">AI productivity must be measured at the system</text>
<text x="939" y="643" class="body">level</text>
<rect x="855" y="701" width="755" height="105" rx="24" ry="24" fill="white" filter="url(#shadow)"/>
<circle cx="899" cy="754" r="24" fill="#2563eb"/>
<text x="899" y="762" text-anchor="middle" class="num">9</text>
<text x="939" y="746" class="body">Strategy must be concrete enough to order</text>
<text x="939" y="770" class="body">choices</text>
<rect x="855" y="828" width="755" height="105" rx="24" ry="24" fill="white" filter="url(#shadow)"/>
<circle cx="899" cy="881" r="24" fill="#2563eb"/>
<text x="899" y="889" text-anchor="middle" class="num">10</text>
<text x="939" y="873" class="body">A healthy system learns</text>
</svg>