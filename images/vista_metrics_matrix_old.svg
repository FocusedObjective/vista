<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1800" height="1220" viewBox="0 0 1800 1220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VISTA metrics matrix</title>
  <desc id="desc">A matrix showing example metrics across the five VISTA dimensions and four timing categories: leading, in-flight, lagging, and learning.</desc>
  <defs>
    <style>
      .title { font: 700 44px Georgia, 'Times New Roman', serif; fill: #17324d; }
      .subtitle { font: 400 20px 'Segoe UI', Tahoma, sans-serif; fill: #53687a; }
      .head { font: 700 20px Georgia, 'Times New Roman', serif; fill: #17324d; }
      .row { font: 700 18px Georgia, 'Times New Roman', serif; fill: #17324d; }
      .body { font: 400 14px 'Segoe UI', Tahoma, sans-serif; fill: #304557; }
      .tag { font: 700 13px 'Segoe UI', Tahoma, sans-serif; fill: #8b5e13; letter-spacing: 1.3px; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#24384a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7f2e8"/>
      <stop offset="100%" stop-color="#efe7d7"/>
    </linearGradient>
  </defs>

  <rect width="1800" height="1220" fill="url(#page)"/>
  <rect x="42" y="36" width="1716" height="1148" rx="28" fill="none" stroke="#dccfb7" stroke-width="2"/>

  <text x="84" y="96" class="title">A balanced VISTA metric set spans time</text>
  <text x="84" y="132" class="subtitle">Each row is a dimension. Each column is a timing category. Good measurement uses all four so teams can choose, steer, verify, and learn.</text>

  <text x="84" y="202" class="tag">EXAMPLE METRIC ARCHITECTURE</text>
  <rect x="84" y="228" width="1632" height="842" rx="30" fill="#fbf8f1" stroke="#d9ccb6" stroke-width="2" filter="url(#shadow)"/>

  <rect x="108" y="252" width="212" height="100" rx="18" fill="#efe7d7"/>
  <text x="214" y="310" text-anchor="middle" class="head">Dimension</text>
  <rect x="336" y="252" width="324" height="100" rx="18" fill="#f4ddd4"/>
  <text x="498" y="298" text-anchor="middle" class="head">Leading</text>
  <text x="498" y="324" text-anchor="middle" class="body">Before work starts</text>
  <rect x="676" y="252" width="324" height="100" rx="18" fill="#ebe0d0"/>
  <text x="838" y="298" text-anchor="middle" class="head">In-flight</text>
  <text x="838" y="324" text-anchor="middle" class="body">During coding and review</text>
  <rect x="1016" y="252" width="324" height="100" rx="18" fill="#dfe9e3"/>
  <text x="1178" y="298" text-anchor="middle" class="head">Lagging</text>
  <text x="1178" y="324" text-anchor="middle" class="body">After release</text>
  <rect x="1356" y="252" width="336" height="100" rx="18" fill="#e9deef"/>
  <text x="1524" y="298" text-anchor="middle" class="head">Learning</text>
  <text x="1524" y="324" text-anchor="middle" class="body">Across repeated patterns</text>

  <rect x="108" y="376" width="1584" height="120" rx="18" fill="#fffaf5"/>
  <text x="136" y="424" class="row">Value</text>
  <text x="336" y="412" class="body">Expected user benefit hypothesis</text>
  <text x="336" y="438" class="body">Adoption target defined before start</text>
  <text x="676" y="412" class="body">Outcome clarity during execution</text>
  <text x="676" y="438" class="body">Evidence attached to the PR</text>
  <text x="1016" y="412" class="body">Adoption by intended users</text>
  <text x="1016" y="438" class="body">Repeat usage and KPI movement</text>
  <text x="1356" y="412" class="body">Prediction accuracy for value hypotheses</text>
  <text x="1356" y="438" class="body">Patterns of low-value work caught earlier</text>

  <rect x="108" y="514" width="1584" height="120" rx="18" fill="#fffaf5"/>
  <text x="136" y="562" class="row">Impact</text>
  <text x="336" y="550" class="body">Strategic relevance score</text>
  <text x="336" y="576" class="body">Capability map tie to roadmap theme</text>
  <text x="676" y="550" class="body">Work mix by strategic initiative</text>
  <text x="676" y="576" class="body">Priority changes triggered mid-flight</text>
  <text x="1016" y="550" class="body">Completed work advancing key initiative</text>
  <text x="1016" y="576" class="body">Segment traction from delivered capability</text>
  <text x="1356" y="550" class="body">Hindsight quality of sequencing choices</text>
  <text x="1356" y="576" class="body">Portfolio drift detected sooner</text>

  <rect x="108" y="652" width="1584" height="120" rx="18" fill="#fffaf5"/>
  <text x="136" y="700" class="row">Safety</text>
  <text x="336" y="688" class="body">Downside risk and verification readiness</text>
  <text x="336" y="714" class="body">Trust, privacy, and security sensitivity</text>
  <text x="676" y="688" class="body">Review depth versus risk</text>
  <text x="676" y="714" class="body">Emerging complexity or rollback burden</text>
  <text x="1016" y="688" class="body">Regressions, security issues, cleanup load</text>
  <text x="1016" y="714" class="body">Customer-facing incident rate</text>
  <text x="1356" y="688" class="body">Repeated issue classes becoming safer</text>
  <text x="1356" y="714" class="body">Review guidance reused on similar work</text>

  <rect x="108" y="790" width="1584" height="120" rx="18" fill="#fffaf5"/>
  <text x="136" y="838" class="row">Timing</text>
  <text x="336" y="826" class="body">Cost-of-delay estimate</text>
  <text x="336" y="852" class="body">Displacement cost of choosing this item</text>
  <text x="676" y="826" class="body">Priority churn during delivery</text>
  <text x="676" y="852" class="body">Capacity still aligned to urgent work</text>
  <text x="1016" y="826" class="body">Capacity spent on high-cost-of-delay work</text>
  <text x="1016" y="852" class="body">Hindsight assessment of priority order</text>
  <text x="1356" y="826" class="body">Opportunity-cost mistakes caught earlier</text>
  <text x="1356" y="852" class="body">Ranking model calibration over time</text>

  <rect x="108" y="928" width="1584" height="120" rx="18" fill="#fffaf5"/>
  <text x="136" y="976" class="row">Adaptation</text>
  <text x="336" y="964" class="body">Known risky pattern recognized before start</text>
  <text x="336" y="990" class="body">Lane selection confidence</text>
  <text x="676" y="964" class="body">Reusable guidance created in review</text>
  <text x="676" y="990" class="body">Lane rescue rate during execution</text>
  <text x="1016" y="964" class="body">Post-release feedback captured cleanly</text>
  <text x="1016" y="990" class="body">Similar work outcome comparisons</text>
  <text x="1356" y="964" class="body">Regression rate by repeated issue type</text>
  <text x="1356" y="990" class="body">AI routing accuracy improving over time</text>

  <text x="84" y="1128" class="body">The common failure mode is collecting only lagging metrics because they are easiest to count. VISTA deliberately pushes measurement earlier so decisions improve before the expensive mistake repeats.</text>
</svg>