<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1800" height="1200" viewBox="0 0 1800 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VISTA principles map</title>
  <desc id="desc">A grouped view of the ten VISTA principles showing how they shape outcome discipline, prioritization, delivery, and organizational learning.</desc>
  <defs>
    <style>
      .title { font: 700 46px Georgia, 'Times New Roman', serif; fill: #17324d; }
      .subtitle { font: 400 21px 'Segoe UI', Tahoma, sans-serif; fill: #53687a; }
      .section { font: 700 26px Georgia, 'Times New Roman', serif; fill: #17324d; }
      .body { font: 400 17px 'Segoe UI', Tahoma, sans-serif; fill: #304557; }
      .small { font: 400 15px 'Segoe UI', Tahoma, sans-serif; fill: #304557; }
      .tag { font: 700 13px 'Segoe UI', Tahoma, sans-serif; fill: #8b5e13; letter-spacing: 1.3px; }
      .num { font: 700 18px Georgia, 'Times New Roman', serif; fill: #fbf8f1; }
      .principle { font: 700 18px Georgia, 'Times New Roman', serif; fill: #17324d; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#24384a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7f2e8"/>
      <stop offset="100%" stop-color="#efe7d7"/>
    </linearGradient>
  </defs>

  <rect width="1800" height="1200" fill="url(#page)"/>
  <rect x="42" y="36" width="1716" height="1128" rx="28" fill="none" stroke="#dccfb7" stroke-width="2"/>

  <text x="84" y="96" class="title">The VISTA principles are grouped ways of thinking</text>
  <text x="84" y="132" class="subtitle">Dimensions tell you what to inspect. Principles tell you how to reason about outcomes, priority, risk, and learning.</text>

  <rect x="520" y="182" width="760" height="132" rx="28" fill="#17324d" filter="url(#shadow)"/>
  <text x="900" y="234" text-anchor="middle" class="tag" fill="#f1c58f">PRINCIPLES ARE THE MENTAL MODEL</text>
  <text x="900" y="272" text-anchor="middle" class="section" fill="#fbf8f1">How to think when output gets cheaper</text>

  <rect x="84" y="390" width="376" height="346" rx="28" fill="#f4ddd4" stroke="#d9ccb6" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="438" class="section">Outcome discipline</text>
  <text x="120" y="470" class="small">Prevent teams from mistaking activity for progress.</text>
  <circle cx="146" cy="532" r="22" fill="#b5533c"/>
  <text x="146" y="539" text-anchor="middle" class="num">1</text>
  <text x="184" y="528" class="principle">Output is not outcome</text>
  <text x="184" y="552" class="body">Shipped work only matters if benefit materializes.</text>
  <circle cx="146" cy="622" r="22" fill="#b5533c"/>
  <text x="146" y="629" text-anchor="middle" class="num">8</text>
  <text x="184" y="618" class="principle">AI productivity is system-level</text>
  <text x="184" y="642" class="body">More code only helps if the whole delivery system improves.</text>

  <rect x="500" y="390" width="376" height="620" rx="28" fill="#ebe0d0" stroke="#d9ccb6" stroke-width="2" filter="url(#shadow)"/>
  <text x="536" y="438" class="section">Prioritization discipline</text>
  <text x="536" y="470" class="small">Force comparative choice and make timing visible.</text>
  <circle cx="562" cy="532" r="22" fill="#9f7a2d"/>
  <text x="562" y="539" text-anchor="middle" class="num">2</text>
  <text x="600" y="528" class="principle">Speed without direction is waste</text>
  <text x="600" y="552" class="body">Flow matters only when it carries the right work.</text>
  <circle cx="562" cy="622" r="22" fill="#9f7a2d"/>
  <text x="562" y="629" text-anchor="middle" class="num">3</text>
  <text x="600" y="618" class="principle">Judge work comparatively</text>
  <text x="600" y="642" class="body">The real question is above what, and at what opportunity cost?</text>
  <circle cx="562" cy="712" r="22" fill="#9f7a2d"/>
  <text x="562" y="719" text-anchor="middle" class="num">4</text>
  <text x="600" y="708" class="principle">Cost of delay matters</text>
  <text x="600" y="732" class="body">Timing changes the right answer even when raw value looks similar.</text>
  <circle cx="562" cy="802" r="22" fill="#9f7a2d"/>
  <text x="562" y="809" text-anchor="middle" class="num">9</text>
  <text x="600" y="798" class="principle">Strategy must order choices</text>
  <text x="600" y="822" class="body">If strategy cannot break ties, it is too vague to guide engineering.</text>

  <rect x="916" y="390" width="376" height="430" rx="28" fill="#dfe9e3" stroke="#d9ccb6" stroke-width="2" filter="url(#shadow)"/>
  <text x="952" y="438" class="section">Delivery discipline</text>
  <text x="952" y="470" class="small">Make hidden downside and hidden cost part of delivery judgment.</text>
  <circle cx="978" cy="532" r="22" fill="#365f68"/>
  <text x="978" y="539" text-anchor="middle" class="num">5</text>
  <text x="1016" y="528" class="principle">Risk gates value</text>
  <text x="1016" y="552" class="body">Some work should pause or reroute until verification is strong enough.</text>
  <circle cx="978" cy="622" r="22" fill="#365f68"/>
  <text x="978" y="629" text-anchor="middle" class="num">6</text>
  <text x="1016" y="618" class="principle">Delivery cost is broader</text>
  <text x="1016" y="642" class="body">Coding is only one part of cost. Activation, review, and cleanup matter too.</text>

  <rect x="1332" y="390" width="384" height="620" rx="28" fill="#e9deef" stroke="#d9ccb6" stroke-width="2" filter="url(#shadow)"/>
  <text x="1368" y="438" class="section">Learning discipline</text>
  <text x="1368" y="470" class="small">Turn review and hindsight into reused judgment, not archived history.</text>
  <circle cx="1394" cy="532" r="22" fill="#6c4f7b"/>
  <text x="1394" y="539" text-anchor="middle" class="num">7</text>
  <text x="1432" y="528" class="principle">Review is a learning system</text>
  <text x="1432" y="552" class="body">Strong review produces future guidance, not just one-off comments.</text>
  <circle cx="1394" cy="622" r="22" fill="#6c4f7b"/>
  <text x="1394" y="629" text-anchor="middle" class="num">10</text>
  <text x="1432" y="618" class="principle">A healthy system learns</text>
  <text x="1432" y="642" class="body">Repeated failure patterns should get safer, clearer, and easier to route.</text>

  <rect x="84" y="786" width="376" height="224" rx="28" fill="#fbf8f1" stroke="#d9ccb6" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="832" class="section">Taken together</text>
  <text x="120" y="870" class="body">The ten principles compress into four disciplines: aim at outcomes, sequence comparatively, respect hidden delivery cost and risk, and learn faster than the same mistake recurs.</text>
  <text x="120" y="926" class="small">That is why VISTA can stay rich without becoming a random pile of metrics.</text>

  <text x="84" y="1110" class="body">The principles make the framework teachable: they explain why VISTA rejects output theater and why the right answer often depends on timing, downside, and hindsight.</text>
</svg>