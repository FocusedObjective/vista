<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1800" height="1200" viewBox="0 0 1800 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VISTA metrics matrix</title>
  <desc id="desc">A matrix showing example metrics across the five VISTA dimensions and four timing categories: leading, in-flight, lagging, and learning.</desc>
  <defs>
    <style>
      .title    { font: 700 42px 'Segoe UI', system-ui, sans-serif; fill: #1a2332; }
      .subtitle { font: 400 18px 'Segoe UI', system-ui, sans-serif; fill: #556677; }
      .label    { font: 700 11px 'Segoe UI', system-ui, sans-serif; fill: #7a8da0; letter-spacing: 2px; }
      .colHead  { font: 700 16px 'Segoe UI', system-ui, sans-serif; fill: #1a2332; }
      .colSub   { font: 400 12px 'Segoe UI', system-ui, sans-serif; fill: #5a6a7c; }
      .dimLabel { font: 700 15px 'Segoe UI', system-ui, sans-serif; fill: #1a2332; }
      .cell     { font: 400 12.5px 'Segoe UI', system-ui, sans-serif; fill: #3a4a5c; }
      .footBody { font: 400 14px 'Segoe UI', system-ui, sans-serif; fill: #4a5a6b; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a2332" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="page" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#f0f2f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1800" height="1200" fill="url(#page)"/>

  <!-- Title -->
  <text x="72" y="72" class="title">A balanced VISTA metric set spans time</text>
  <text x="72" y="104" class="subtitle">Each row is a dimension. Each column is a timing category. Good measurement uses all four so teams can choose, steer, verify, and learn.</text>

  <text x="72" y="160" class="label">EXAMPLE METRIC ARCHITECTURE</text>

  <!-- Table container -->
  <rect x="72" y="180" width="1656" height="832" rx="18" fill="#ffffff" stroke="#e2e6ec" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- ========== HEADER ROW ========== -->
  <!-- Dimension column header -->
  <rect x="72" y="180" width="186" height="80" rx="18" fill="#f0f2f6"/>
  <rect x="258" y="180" width="0" height="80" fill="#f0f2f6"/>
  <text x="165" y="228" text-anchor="middle" class="colHead">Dimension</text>

  <!-- Leading header -->
  <rect x="258" y="180" width="348" height="80" fill="#e8f0fe"/>
  <text x="432" y="218" text-anchor="middle" class="colHead">Leading</text>
  <text x="432" y="238" text-anchor="middle" class="colSub">Before work starts</text>

  <!-- In-flight header -->
  <rect x="606" y="180" width="348" height="80" fill="#fef3e0"/>
  <text x="780" y="218" text-anchor="middle" class="colHead">In-flight</text>
  <text x="780" y="238" text-anchor="middle" class="colSub">During coding and review</text>

  <!-- Lagging header -->
  <rect x="954" y="180" width="348" height="80" fill="#e4f0ef"/>
  <text x="1128" y="218" text-anchor="middle" class="colHead">Lagging</text>
  <text x="1128" y="238" text-anchor="middle" class="colSub">After release</text>

  <!-- Learning header -->
  <rect x="1302" y="180" width="426" height="80" rx="0" fill="#ede4f2"/>
  <rect x="1692" y="180" width="36" height="80" rx="18" fill="#ede4f2"/>
  <rect x="1692" y="180" width="18" height="80" fill="#ede4f2"/>
  <text x="1524" y="218" text-anchor="middle" class="colHead">Learning</text>
  <text x="1524" y="238" text-anchor="middle" class="colSub">Across repeated patterns</text>

  <!-- Column divider lines -->
  <line x1="258" y1="260" x2="258" y2="1012" stroke="#e8eaee" stroke-width="1"/>
  <line x1="606" y1="260" x2="606" y2="1012" stroke="#e8eaee" stroke-width="1"/>
  <line x1="954" y1="260" x2="954" y2="1012" stroke="#e8eaee" stroke-width="1"/>
  <line x1="1302" y1="260" x2="1302" y2="1012" stroke="#e8eaee" stroke-width="1"/>

  <!-- ========== ROW 1: Value ========== -->
  <rect x="72" y="260" width="1656" height="144" fill="#ffffff"/>
  <rect x="72" y="260" width="6" height="144" fill="#4a7fd4"/>
  <text x="100" y="344" class="dimLabel">Value</text>
  <text x="278" y="316" class="cell">Expected user benefit hypothesis</text>
  <text x="278" y="340" class="cell">Adoption target defined before start</text>
  <text x="626" y="316" class="cell">Outcome clarity during execution</text>
  <text x="626" y="340" class="cell">Evidence attached to the PR</text>
  <text x="974" y="316" class="cell">Adoption by intended users</text>
  <text x="974" y="340" class="cell">Repeat usage and KPI movement</text>
  <text x="1322" y="316" class="cell">Prediction accuracy for value</text>
  <text x="1322" y="340" class="cell">hypotheses over time</text>

  <!-- Row divider -->
  <line x1="72" y1="404" x2="1728" y2="404" stroke="#e8eaee" stroke-width="1"/>

  <!-- ========== ROW 2: Impact ========== -->
  <rect x="72" y="404" width="1656" height="144" fill="#fafbfc"/>
  <rect x="72" y="404" width="6" height="144" fill="#d4943a"/>
  <text x="100" y="488" class="dimLabel">Impact</text>
  <text x="278" y="460" class="cell">Strategic relevance score</text>
  <text x="278" y="484" class="cell">Capability map tie to roadmap theme</text>
  <text x="626" y="460" class="cell">Work mix by strategic initiative</text>
  <text x="626" y="484" class="cell">Priority changes triggered mid-flight</text>
  <text x="974" y="460" class="cell">Work advancing key initiative</text>
  <text x="974" y="484" class="cell">Segment traction from capability</text>
  <text x="1322" y="460" class="cell">Hindsight quality of sequencing</text>
  <text x="1322" y="484" class="cell">Portfolio drift detected sooner</text>

  <!-- Row divider -->
  <line x1="72" y1="548" x2="1728" y2="548" stroke="#e8eaee" stroke-width="1"/>

  <!-- ========== ROW 3: Safety ========== -->
  <rect x="72" y="548" width="1656" height="144" fill="#ffffff"/>
  <rect x="72" y="548" width="6" height="144" fill="#3a8a7a"/>
  <text x="100" y="632" class="dimLabel">Safety</text>
  <text x="278" y="604" class="cell">Downside risk and verification readiness</text>
  <text x="278" y="628" class="cell">Trust, privacy, security sensitivity</text>
  <text x="626" y="604" class="cell">Review depth versus risk</text>
  <text x="626" y="628" class="cell">Emerging complexity or rollback burden</text>
  <text x="974" y="604" class="cell">Regressions, security issues, cleanup</text>
  <text x="974" y="628" class="cell">Customer-facing incident rate</text>
  <text x="1322" y="604" class="cell">Repeated issue classes becoming safer</text>
  <text x="1322" y="628" class="cell">Review guidance reused on similar work</text>

  <!-- Row divider -->
  <line x1="72" y1="692" x2="1728" y2="692" stroke="#e8eaee" stroke-width="1"/>

  <!-- ========== ROW 4: Timing ========== -->
  <rect x="72" y="692" width="1656" height="144" fill="#fafbfc"/>
  <rect x="72" y="692" width="6" height="144" fill="#5a8a4a"/>
  <text x="100" y="776" class="dimLabel">Timing</text>
  <text x="278" y="748" class="cell">Cost-of-delay estimate</text>
  <text x="278" y="772" class="cell">Displacement cost of choosing this item</text>
  <text x="626" y="748" class="cell">Priority churn during delivery</text>
  <text x="626" y="772" class="cell">Capacity still aligned to urgent work</text>
  <text x="974" y="748" class="cell">Capacity on high-cost-of-delay work</text>
  <text x="974" y="772" class="cell">Hindsight assessment of priority order</text>
  <text x="1322" y="748" class="cell">Opportunity-cost mistakes caught earlier</text>
  <text x="1322" y="772" class="cell">Ranking model calibration over time</text>

  <!-- Row divider -->
  <line x1="72" y1="836" x2="1728" y2="836" stroke="#e8eaee" stroke-width="1"/>

  <!-- ========== ROW 5: Adaptation ========== -->
  <rect x="72" y="836" width="1656" height="144" fill="#ffffff"/>
  <rect x="72" y="836" width="6" height="144" fill="#7a5a9a"/>
  <text x="100" y="920" class="dimLabel">Adaptation</text>
  <text x="278" y="892" class="cell">Known risky pattern recognized</text>
  <text x="278" y="916" class="cell">Lane selection confidence</text>
  <text x="626" y="892" class="cell">Reusable guidance created in review</text>
  <text x="626" y="916" class="cell">Lane rescue rate during execution</text>
  <text x="974" y="892" class="cell">Post-release feedback captured cleanly</text>
  <text x="974" y="916" class="cell">Similar work outcome comparisons</text>
  <text x="1322" y="892" class="cell">Regression rate by repeated issue type</text>
  <text x="1322" y="916" class="cell">AI routing accuracy improving over time</text>

  <!-- ========== FOOTER ========== -->
  <rect x="72" y="1060" width="1656" height="80" rx="18" fill="#ffffff" stroke="#e2e6ec" stroke-width="1.5"/>
  <text x="104" y="1098" class="footBody">The common failure mode is collecting only lagging metrics because they are easiest to count. VISTA deliberately pushes measurement</text>
  <text x="104" y="1118" class="footBody">earlier so decisions improve before the expensive mistake repeats.</text>
</svg>