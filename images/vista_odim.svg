<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1800" height="1100" viewBox="0 0 1800 1100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 40px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 19px Arial, Helvetica, sans-serif; fill: #475569; }
      .boxTitle { font: 700 24px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .body { font: 400 17px Arial, Helvetica, sans-serif; fill: #334155; }
      .tiny { font: 600 14px Arial, Helvetica, sans-serif; fill: #1d4ed8; }
      .minihead { font: 700 18px Arial, Helvetica, sans-serif; fill: #0f172a; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,7 L0,14 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1800" height="1100" fill="#f8fafc"/>
  <text x="80" y="88" class="title">ODIM: how VISTA designs useful metrics</text>
  <text x="80" y="124" class="subtitle">Outcome → Decision → Insight → Measure keeps metrics tied to real outcomes instead of floating as isolated counters.</text>

<rect x="80" y="190" width="360" height="165" rx="26" ry="26" fill="#eff6ff" filter="url(#shadow)"/>
<text x="108" y="236" class="boxTitle">Outcome</text>
<text x="108" y="272" class="body">What business, customer, product,</text>
<text x="108" y="296" class="body">or strategic result are we trying</text>
<text x="108" y="320" class="body">to achieve?</text>
<rect x="500" y="190" width="360" height="165" rx="26" ry="26" fill="#f0fdf4" filter="url(#shadow)"/>
<text x="528" y="236" class="boxTitle">Decision</text>
<text x="528" y="272" class="body">What decision do we need to make</text>
<text x="528" y="296" class="body">to improve that outcome?</text>
<rect x="920" y="190" width="360" height="165" rx="26" ry="26" fill="#fefce8" filter="url(#shadow)"/>
<text x="948" y="236" class="boxTitle">Insight</text>
<text x="948" y="272" class="body">What understanding would help us</text>
<text x="948" y="296" class="body">make that decision better?</text>
<rect x="1340" y="190" width="360" height="165" rx="26" ry="26" fill="#f5f3ff" filter="url(#shadow)"/>
<text x="1368" y="236" class="boxTitle">Measure</text>
<text x="1368" y="272" class="body">What observable signal helps</text>
<text x="1368" y="296" class="body">generate that insight?</text>
<line x1="440" y1="272" x2="500" y2="272" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="860" y1="272" x2="920" y2="272" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="1280" y1="272" x2="1340" y2="272" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="90" y="430" width="320" height="250" rx="24" ry="24" fill="white" filter="url(#shadow)"/>
<text x="114" y="468" class="minihead">Value</text>
<text x="114" y="502" class="body">Outcome: increase retention</text>
<text x="114" y="562" class="body">Decision: which feature should</text>
<text x="114" y="584" class="body">be improved first?</text>
<text x="114" y="636" class="tiny">Measure: repeat usage by</text>
<text x="114" y="658" class="tiny">retained vs churned customers</text>
<rect x="435" y="430" width="320" height="250" rx="24" ry="24" fill="white" filter="url(#shadow)"/>
<text x="459" y="468" class="minihead">Impact</text>
<text x="459" y="502" class="body">Outcome: win in a target</text>
<text x="459" y="524" class="body">segment</text>
<text x="459" y="562" class="body">Decision: which capability</text>
<text x="459" y="584" class="body">should be prioritized?</text>
<text x="459" y="636" class="tiny">Measure: segment-specific</text>
<text x="459" y="658" class="tiny">capability adoption and</text>
<text x="459" y="680" class="tiny">downstream conversion</text>
<rect x="780" y="430" width="320" height="250" rx="24" ry="24" fill="white" filter="url(#shadow)"/>
<text x="804" y="468" class="minihead">Safety</text>
<text x="804" y="502" class="body">Outcome: reduce customer-facing</text>
<text x="804" y="524" class="body">regressions</text>
<text x="804" y="562" class="body">Decision: which changes need</text>
<text x="804" y="584" class="body">deeper review?</text>
<text x="804" y="636" class="tiny">Measure: regression rate and</text>
<text x="804" y="658" class="tiny">cleanup burden by change type</text>
<rect x="1125" y="430" width="320" height="250" rx="24" ry="24" fill="white" filter="url(#shadow)"/>
<text x="1149" y="468" class="minihead">Timing</text>
<text x="1149" y="502" class="body">Outcome: improve strategic</text>
<text x="1149" y="524" class="body">sequencing</text>
<text x="1149" y="562" class="body">Decision: which item should go</text>
<text x="1149" y="584" class="body">next?</text>
<text x="1149" y="636" class="tiny">Measure: capacity allocation to</text>
<text x="1149" y="658" class="tiny">high-cost-of-delay work</text>
<rect x="1470" y="430" width="320" height="250" rx="24" ry="24" fill="white" filter="url(#shadow)"/>
<text x="1494" y="468" class="minihead">Adaptation</text>
<text x="1494" y="502" class="body">Outcome: reduce repeated</text>
<text x="1494" y="524" class="body">engineering mistakes</text>
<text x="1494" y="562" class="body">Decision: how should similar</text>
<text x="1494" y="584" class="body">future work be reviewed or</text>
<text x="1494" y="606" class="body">routed?</text>
<text x="1494" y="636" class="tiny">Measure: regression rate by</text>
<text x="1494" y="658" class="tiny">repeated issue type over time</text>
<text x="80" y="760" class="subtitle">ODIM can also be used in reverse as MIDO when a team starts with existing measures and tests whether they connect back to real outcomes.</text>
</svg>